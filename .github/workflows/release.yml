# .github/workflows/release.yml
name: Build & Push immagini

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            dockerfile: apps/backend/Dockerfile
          - app: frontend-admin
            dockerfile: apps/frontend-admin/Dockerfile
          - app: frontend-citizen
            dockerfile: apps/frontend-citizen/Dockerfile
          - app: pdf-extractor
            dockerfile: services/pdf-extractor/Dockerfile
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/comune-di-montesilvano/comunicapa-${{ matrix.app }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          cache-from: type=registry,ref=ghcr.io/comune-di-montesilvano/comunicapa-${{ matrix.app }}:buildcache
          cache-to: type=registry,ref=ghcr.io/comune-di-montesilvano/comunicapa-${{ matrix.app }}:buildcache,mode=max
