server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # config.js è generato a runtime: mai in cache
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # Proxy interno verso il backend sulla rete Docker: il browser chiama
    # /api/... sullo stesso dominio del frontend (niente CORS, backend mai
    # esposto direttamente). Il prefisso /api viene rimosso dal proxy_pass.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
